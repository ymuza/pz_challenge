#
# Particulars about specific catalogs.
# 
# These keep track of things like the mapping between band names and columns,
# names of special columns like the objectId and the 'true' redshift, guard
# values used to specify non-detections or non-observations.
#
# The mapping between bands and magnitude, magnitude error columns
# is constructed by looping over the band_list add resolving
# mag_column_template and mag_err_column_template.
#
# Similarly, the mapping between bands and filters is constructed
# by looping over the band_list add resolving filter_template.
#
# The `bands` field is used to provide band-specific overrides.
# At a minimum this must include 5-sigma limiting magnitdues.
#
# But it may also include specfic overrides for the names of the
# mag_column, mag_err_columns and filter template file, for example when a
# subset of band_list entries do not follow the patterns in the templates.
#
CatalogTags:
  - CatalogTag:
      # This is for rubin only data in the data challenge
      name: "cardinal_rubin"
      mag_column_template: "mag_{band}_lsst"
      mag_err_column_template: "mag_{band}_lsst_err"
      filter_template: "DC2LSST_{band}"
      band_list: ['u', 'g', 'r', 'i', 'z', 'y', 'W1']
      bands:
        u:
          mag_limit: 26.4
        g:
          mag_limit: 27.8
        r:
          mag_limit: 27.1
        i:
          mag_limit: 26.7
        z:
          mag_limit: 25.8
        y:
          mag_limit: 24.6
        W1:
          filter: WISE_W1
          mag_column_name: "mag_w1_wise"
          mag_err_column_name: "mag_w1_wise_err"
          mag_limit: 26.5
  - CatalogTag:
      # This is for the roman rubin sims, which don't have the euclids band yet
      name: "cardinal_roman_rubin"
      mag_column_template: "mag_{band}_lsst"
      mag_err_column_template: "mag_{band}_lsst_err"
      filter_template: "DC2LSST_{band}"
      band_list: ['u', 'g', 'r', 'i', 'z', 'y', 'Y', 'J', 'H']
      bands:
        u:
          mag_limit: 26.4
        g:
          mag_limit: 27.8
        r:
          mag_limit: 27.1
        i:
          mag_limit: 26.7
        z:
          mag_limit: 25.8
        y:
          mag_limit: 24.6
        Y:
          filter: roman_Y106
          mag_column_name: "mag_Y_roman"
          mag_err_column_name: "mag_Y_roman_err"
          mag_limit: 26.5
        J:
          filter: roman_J129
          mag_column_name: "mag_J_roman"
          mag_err_column_name: "mag_J_roman_err"
          mag_limit: 26.5
        H:
          filter: roman_H158
          mag_column_name: "mag_H_roman"
          mag_err_column_name: "mag_H_roman_err"
          mag_limit: 26.5
  - CatalogTag:
      # This is for rubin only data in the data challenge
      name: "flagship_rubin"
      mag_column_template: "mag_{band}_lsst"
      mag_err_column_template: "mag_{band}_lsst_err"
      filter_template: "DC2LSST_{band}"
      band_list: ['u', 'g', 'r', 'i', 'z', 'y']
      bands:
        u:
          mag_limit: 26.4
        g:
          mag_limit: 27.8
        r:
          mag_limit: 27.1
        i:
